<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KorokNet</title>
</head>
<body>
    <h1>Регистрация</h1>
    <p>Есть аккаунт? <a href="/login">Войти</a></p>
    {%if error%}
    <p style="color: red;">Ошибка</p>
    {%endif%}
    <form action="/register" method="post">
        Логин: <input type="text" name="login" required> <p>Латиница и цифры, не менее 6 символов</p> <br>
        Пароль: <input type="password" name="password" minlength="8" required> <p>Минимум 8 символов</p> <br>
        ФИО: <input type="text" name="fio" required pattern="[а-яА-Я ]+"> <p>Символы кириллицы и пробелы</p> <br>
        Почта: <input type="text" name="email" required> <p>Формат: электронной почты</p> <br>
        Телефон: <input type="text" name="phone" required pattern="8\(\d\d\d)\d\d\d-\d\d-\d\d"> <p>Формат: 8(XXX)XXX-XX-XX</p> <br>
        <button type="submit">Зарегистрироваться</button>
    </form>
</body>
</html>
