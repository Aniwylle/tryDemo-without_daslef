<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KorokNet</title>
</head>
<body>
    <h1>Авторизация</h1>
    <p>Нет аккаунта? <a href="/register">Войти</a></p>
    {%if error%}
    <p style="color: red;">Ошибка</p>
    {%endif%}
    <form action="/login" method="post">
        Логин: <input type="text" name="login" required> <p>Латиница и цифры, не менее 6 символов</p> <br>
        Пароль: <input type="password" name="password" minlength="8" required> <p>Минимум 8 символов</p> <br>
        <button type="submit">Войти</button>
    </form>
</body>
</html>
