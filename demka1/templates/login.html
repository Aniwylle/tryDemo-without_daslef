<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KorokNET</title>
</head>
<body>
    <h1>Войти</h1>
    {%if error%}
    <p style="color: red;">{{error}}</p>
    {%endif%}

    <form method="post">
        Логин: <input name="login" required> <br>
        Пароль: <input name="password"> <br>
        <button type="submit">Войти</button> <br>
    </form>
    <p>Еще не зарегистрированы? <a href="/register">Зарегистрироваться</a></p> <br>
</body>
</html>
