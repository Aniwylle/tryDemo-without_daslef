<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>KorokNet</title>
</head>
<body>
<h1>Профиль</h1>
<a href="/create_request">Новая заявка</a> | <a href="/logout">Выйти</a>
{%for r in requests%}
<div style="border: 1px solid gray; margin: 1px; padding: 1px">
    <p>Курс: {{r.course_name}}</p> <br>
    <p>Дата: {{r.date_start}}</p> <br>
    <p>Оплата: {{r.payment_method}}</p> <br>
    <p>Статус: {{r.status}} </p>
</div>
{%endfor%}
</body>
</html>
