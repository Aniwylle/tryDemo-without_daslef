<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>KorokNet</title>
</head>
<body>
<h1>Регистрация</h1>
<p>Есть аккаунт? <a href="/login">Войти</a></p>
{%if error%}
<p style="color: red;">Ошибка</p>
{%endif%}
<form method="post">
    Логин: <input type="text" name="login" pattern="[a-zA-Z0-9]{6,}" required> <p>латиница и цифры, не менее 6 символов</p>
    Пароль: <input type="password" name="password" minlength="8" required> <p>минимум 8 символов</p>
    ФИО: <input type="text" name="fio" pattern="[а-яА-Я]+" required> <p>символы кириллицы и пробелы</p>
    Почта: <input type="text" name="email" required> <p>формат: электронной почты</p>
    Телефон: <input type="text" name="phone" pattern="8\(\d\d\d\)\d\d\d-\d\d-\d\d" required> <p>формат: 8(XXX)XXX-XX-XX</p>
    <button type="submit">Зарегистрироваться</button>
</form>
</body>
</html>
