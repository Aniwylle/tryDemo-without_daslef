<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KorokNet</title>
</head>
<body>
    <h1>Регистрация</h1>
    {%if error%}
    <p style="color: red;">{{error}}</p>
    {%endif%}
    <p>Уже зарегистрированы? <a href="/login">Войти</a></p>
    <form action="/register" method="post">
        <input type="text" name="login" value="{{login}}" required placeholder="Логин">
        <input type="password" name="password" required placeholder="Пароль">
        <input type="text" name="fio" value="{{fio}}" required placeholder="ФИО">
        <input type="text" name="phone" value="{{phone}}" required placeholder="Телефон">
        <input type="text" name="email" value="{{email}}" required placeholder="Почта">
        <button type="submit">Зарегистрироваться</button>
    </form>
</body>
</html>
