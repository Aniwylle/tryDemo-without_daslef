<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KorokNet</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <h1>Регистрация</h1>
    {%if error%}
    <p style="color: red;">{{error}}</p>
    {%endif%}
    <p>Уже зарегистрированы? <a href="/login">Войти</a></p>
    <form action="/register" method="post">
        <input type="text" name="login" required placeholder="Логин" value="{{login}}"> <br>
        <input type="password" name="password" required placeholder="Пароль"> <br>
        <input type="text" name="fio" required placeholder="ФИО" value="{{fio}}"> <br>
        <input type="text" name="phone" required placeholder="Телефон" value="{{phone}}"> <br>
        <input type="text" name="email" required placeholder="Почта" value="{{email}}"> <br>
        <button type="submit">Зарегистрироваться</button>
    </form>
</body>
</html>
