<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KorokNet</title>
</head>
<body>
    <h1>Регистрация</h1>
    {%if error%}
    <p style="color: red;">Ошибка</p>
    {%endif%}
    <p>Есть аккаунт? <a href="/login">Войти</a></p>
    <form action="/register" method="post">
        <input type="text" name="login" placeholder="Логин" required> <p>Латиница и цифры, не менее 6 символов</p>
        <input type="password" name="password" minlength="8" placeholder="Пароль" required> <p>Минимум 8 символов</p>
        <input type="text" name="fio" pattern="[а-яА-Я ]+" placeholder="ФИО" required> <p>Символы кириллицы и пробелы</p>
        <input type="text" name="email" placeholder="Почта" required> <p>Формат: электронной почты</p>
        <input type="text" name="phone" pattern="8\(\d\d\d)\d\d\d-\d\d-\d\d" placeholder="Телефон" required> <p>Формат: 8(XXX)XXX-XX-XX</p>
        <button type="submit">Зарегистрироваться</button>
    </form>
</body>
</html>
