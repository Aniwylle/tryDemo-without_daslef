<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KorokNet</title>
</head>
<body>
    <h1>Регистрация</h1>
    <p>Уже зарегистрированы? <a href="/login">Войти</a></p>
    {%if error%}
    <p style="color: red;">{{error}}</p>
    {%endif%}
    <form action="/register" method="post">
        <input type="text" name="login" required value="{{login}}" placeholder="Логин"> <p>латиница и цифры, не менее 6 символов</p> <br>
        <input type="password" name="password" required placeholder="Пароль"> <p>минимум 8 символов</p> <br>
        <input type="text" name="fio" required value="{{fio}}" placeholder="ФИО"> <p>символы кириллицы и пробелы</p> <br>
        <input type="text" name="phone" required value="{{phone}}" placeholder="Телефон"> <p>формат: 8(XXX)XXX-XX-XX</p> <br>
        <input type="text" name="email" required value="{{email}}" placeholder="Почта"> <p>формат: электронной почты</p> <br>
        <button type="submit">Зарегистрироваться</button>
    </form>
</body>
</html>
