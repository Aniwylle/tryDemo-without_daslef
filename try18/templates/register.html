<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KorokNet</title>
</head>
<body>
    <h1>Регистрация</h1>
    <p>Уже зарегистрированы? <a href="/login">Войти</a></p>
    {%if error%}
    <p style="color: red;">Ошибка</p>
    {%endif%}
    <form action="/register" method="post">
        <input type="text" name="login" placeholder="Логин" required> <p>латиница и цифры, не менее 6 символов</p>
        <input type="password" name="password" placeholder="Пароль" minlength="8" required> <p>минимум 8 символов</p>
        <input type="text" name="fio" placeholder="ФИО" pattern="[а-яА-Я ]+" required> <p>символы кириллицы и пробелы</p>
        <input type="text" name="phone" placeholder="Телефон" pattern="8\(\d\d\d)\d\d\d-\d\d-\d\d" required> <p>формат: 8(XXX)XXX-XX-XX</p>
        <input type="text" name="email" placeholder="Почта" required> <p>формат: электронной почты</p>
        <button type="submit">Зарегистрироваться</button>
    </form>
</body>
</html>
