<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KorokNet</title>
</head>
<body>
    <h1>Регистрация</h1>
    <p>Есть аккаунт? <a href="/login">Войти</a></p>
    {%if error%}
        <p style="color: red;">Ошибка</p>
    {%endif%}
    <form action="/register" method="post">
        <input type="text" name="login" required placeholder="Логин"> <p>латиница и цифры, не менее 6 символов</p> <br>
        <input type="password" name="password" required placeholder="Пароль" minlength="8"> <p>минимум 8 символов</p> <br>
        <input type="text" name="fio" required placeholder="ФИО" pattern="[а-яА-Я ]+"> <p>символы кириллицы и пробелы</p> <br>
        <input type="text" name="email" required placeholder="Почта"> <p>формат: электронной почты</p> <br>
        <input type="text" name="phone" required placeholder="Телефон" pattern="8\(\d\d\d)\d\d\d-\d\d-\d\d"> <p>формат: 8(XXX)XXX-XX-XX</p> <br>
        <button type="submit">Зарегистрироваться</button>
</body>
</html>
