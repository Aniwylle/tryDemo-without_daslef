<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KorokNet</title>
</head>
<body>
    <h1>Авторизация</h1>
    <p>Нет аккаунта? <a href="/register">Зарегистрироваться</a></p>
    {%if error%}
        <p style="color: red;">Ошибка</p>
    {%endif%}
    <form action="/login" method="post">
        <input type="text" name="login" required placeholder="Логин"> <p>латиница и цифры, не менее 6 символов</p> <br>
        <input type="password" name="password" required placeholder="Пароль" minlength="8"> <p>минимум 8 символов</p> <br>
        <button type="submit">Войти</button>
</body>
</html>
